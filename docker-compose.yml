services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -c "from finance_llm.app import serve; serve(host='0.0.0.0', port=8000)"
    restart: unless-stopped

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/app/data
    command: streamlit run finance_llm/ui.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
